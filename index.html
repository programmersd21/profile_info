
<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pro-grammer-SD | Premium Coffee & Code</title>
    <link rel="icon" type="image/png" href="https://github.com/pro-grammer-SD.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              coffee: {
                50: '#fdfcfb',
                100: '#f7f3f0',
                200: '#eee4dc',
                300: '#e1d0c1',
                400: '#c6a68f',
                500: '#a67c52',
                600: '#8c5e3c',
                700: '#734b32',
                800: '#593a27',
                900: '#332116',
                950: '#1a110b',
              },
            },
            borderRadius: {
              '2xl': '1rem',
              '3xl': '1.5rem',
              '4xl': '2rem',
              '5xl': '2.5rem',
              '6xl': '3.5rem',
            },
            boxShadow: {
              'premium': '0 40px 80px -20px rgba(0, 0, 0, 0.15)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            },
            animation: {
              'float': 'float 20s infinite ease-in-out',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'blob': 'blob 20s infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translate(0, 0) rotate(0deg)' },
                '33%': { transform: 'translate(30px, -50px) rotate(10deg)' },
                '66%': { transform: 'translate(-20px, 20px) rotate(-5deg)' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { 
        -webkit-font-smoothing: antialiased; 
        scroll-behavior: smooth; 
        background-color: #fdfcfb;
      }
      
      .dark body {
        background-color: #0c0a09;
      }

      /* GOD LEVEL LIQUID GLASS ENGINE v4.1 (Optimized) */
      
      .liquid-glass {
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(60px) saturate(220%);
        -webkit-backdrop-filter: blur(60px) saturate(220%);
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-top: 1px solid rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 
          0 10px 40px -10px rgba(0, 0, 0, 0.05),
          inset 0 0 0 1px rgba(255, 255, 255, 0.1),
          inset 0 0 20px rgba(255, 255, 255, 0.2);
        /* Hardware Acceleration Hint */
        transform: translateZ(0);
        will-change: transform, opacity;
      }

      .dark .liquid-glass {
        background: rgba(40, 40, 40, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 
          0 15px 40px -10px rgba(0, 0, 0, 0.3),
          inset 0 0 0 1px rgba(255, 255, 255, 0.05),
          inset 0 0 20px rgba(255, 255, 255, 0.02);
      }

      .liquid-glass-high {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(100px) saturate(250%) brightness(1.1);
        -webkit-backdrop-filter: blur(100px) saturate(250%) brightness(1.1);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-top: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 
          0 40px 80px -20px rgba(0, 0, 0, 0.2), 
          inset 0 1px 2px rgba(255, 255, 255, 0.9), 
          inset 0 -1px 2px rgba(0, 0, 0, 0.05), 
          inset 0 0 40px rgba(255, 255, 255, 0.4);
        transform: translateZ(0);
        will-change: transform, opacity;
      }

      .dark .liquid-glass-high {
        background: rgba(30, 30, 30, 0.5);
        backdrop-filter: blur(100px) saturate(200%) brightness(1.2);
        -webkit-backdrop-filter: blur(100px) saturate(200%) brightness(1.2);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 
          0 40px 100px -20px rgba(0, 0, 0, 0.6),
          inset 0 1px 1px rgba(255, 255, 255, 0.3),
          inset 0 0 40px rgba(255, 255, 255, 0.03);
      }

      /* MOBILE OPTIMIZATIONS - CRITICAL FOR PERFORMANCE */
      @media (max-width: 768px) {
        .liquid-glass {
          backdrop-filter: blur(16px) saturate(180%);
          -webkit-backdrop-filter: blur(16px) saturate(180%);
          box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.1);
        }
        .liquid-glass-high {
          backdrop-filter: blur(24px) saturate(200%);
          -webkit-backdrop-filter: blur(24px) saturate(200%);
        }
        /* Reduce shadow complexity on mobile */
        .liquid-glass, .liquid-glass-high {
           box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
        }
      }

      .noise-overlay {
        position: fixed; inset: 0; pointer-events: none; opacity: 0.04; z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        mix-blend-mode: overlay;
      }

      .refract-edge { filter: url(#wavy); }
      
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { 
        background: rgba(166, 124, 82, 0.3); 
        border-radius: 10px; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(166, 124, 82, 0.6); }

      h1, h2, h3 { letter-spacing: -0.03em; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
        "remark-gfm": "https://esm.sh/remark-gfm@^4.0.1",
        "rehype-raw": "https://esm.sh/rehype-raw@^7.0.0",
        "lottie-web": "https://esm.sh/lottie-web@^5.12.2",
        "recharts": "https://esm.sh/recharts@^2.12.7"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="text-coffee-950 dark:text-coffee-50 overflow-x-hidden selection:bg-coffee-500/30 selection:text-coffee-900 antialiased">
    <div class="noise-overlay"></div>
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glass-distortion">
          <feTurbulence type="fractalNoise" baseFrequency="0.01 0.005" numOctaves="2" result="warp" />
          <feDisplacementMap xChannelSelector="R" yChannelSelector="G" scale="10" in="SourceGraphic" in2="warp" />
        </filter>
        <filter id="chromatic-aberration">
           <feOffset in="SourceGraphic" dx="1" dy="0" result="red"/>
           <feOffset in="SourceGraphic" dx="-1" dy="0" result="blue"/>
           <feMerge>
               <feMergeNode in="red"/>
               <feMergeNode in="blue"/>
           </feMerge>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
